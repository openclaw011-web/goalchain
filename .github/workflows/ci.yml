name: GoalChain CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build   # tsc — mirrors Render's build; catches type errors jest's ts-jest skips
      - run: npm test
        env:
          NODE_ENV: test
          TXLINE_API_BASE: https://txline-dev.txodds.com/api
          TXLINE_API_TOKEN: mock_token_for_ci
          TXLINE_JWT: mock_jwt_for_ci
          SOLANA_RPC_URL: https://api.devnet.solana.com
          DATABASE_PATH: ':memory:'

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXT_PUBLIC_WS_URL: ws://localhost:3001
          NEXT_PUBLIC_SOLANA_RPC: https://api.devnet.solana.com
          NEXT_PUBLIC_PREDICTION_PROGRAM_ID: C5vNdxLcaMriywhQJzv3Dv8PKDfkfnKWHvqCVnqgEQE5

  contract-build:
    name: Smart Contract Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          # The action defaults to RUSTFLAGS=-D warnings, which fails on
          # warnings emitted from inside Anchor's derive macros
          # (anchor-debug cfg, deprecated realloc) — not our code.
          rustflags: ''
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/prediction-market/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Check contract compiles
        working-directory: contracts/prediction-market
        run: cargo check --manifest-path programs/prediction-market/Cargo.toml

  # Deploy jobs are skipped until the ENABLE_DEPLOY repository variable is
  # set to 'true' (Settings → Secrets and variables → Actions → Variables)
  # alongside the Railway/Vercel secrets — otherwise they would fail red on
  # every push.
  deploy-backend:
    name: Deploy Backend (Railway)
    needs: [backend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: goalchain-backend

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: [frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
